plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.cactusgemma'
version = '1.0.0'

android {
  namespace "com.cactusgemma"
  compileSdk 35

  defaultConfig {
    minSdk 24
    versionCode 1
    versionName "1.0.0"

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++20", "-O3", "-DNDEBUG"
        arguments "-DANDROID_STL=c++_shared", "-DANDROID_ARM_NEON=TRUE"
        abiFilters "arm64-v8a"
      }
    }
  }

  externalNativeBuild {
    cmake {
      path file("src/main/cpp/CMakeLists.txt")
      version "3.22.1"
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}
