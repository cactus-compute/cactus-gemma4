plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.cactusgemma'
version = '1.0.0'

android {
  namespace "com.cactusgemma"
  compileSdk 35

  defaultConfig {
    minSdk 24
    versionCode 1
    versionName "1.0.0"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}
